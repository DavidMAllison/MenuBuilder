<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Review — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #555;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .remember-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .remember-row label {
      margin: 0;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }

    .error {
      background: #fff2f2;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: #c00;
      margin-bottom: 16px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Recipe Review</h1>
    <p class="subtitle">Allison Family</p>

    <div class="error" id="error-msg" style="display:none">Incorrect email or password.</div>

    <form method="POST" action="/login">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember" checked>
        <label for="remember">Remember me for 30 days</label>
      </div>

      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
    // Preserve ?next= on form submit
    const next = params.get('next');
    if (next) {
      const form = document.querySelector('form');
      form.action = `/login?next=${encodeURIComponent(next)}`;
    }
  </script>
</body>
</html>
