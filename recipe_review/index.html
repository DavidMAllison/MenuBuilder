<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-title { flex-shrink: 0; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    header p  { font-size: 12px; color: #888; margin-top: 2px; }

    .search-wrap {
      flex: 1;
      max-width: 480px;
      margin-left: auto;
      position: relative;
    }

    .search-wrap svg.search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 8px 34px 8px 34px;
      border: 1.5px solid #e0e0e0;
      border-radius: 22px;
      font-size: 13px;
      background: #f8f8f8;
      color: #222;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    #search-input:focus {
      border-color: #2980b9;
      background: #fff;
    }

    #search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 2px;
      display: none;
      line-height: 0;
    }

    #search-clear:hover { color: #555; }

    .search-hint {
      font-size: 10px;
      color: #bbb;
      text-align: right;
      margin-top: 3px;
      padding-right: 4px;
    }

    /* Search results mode */
    .search-results-header {
      padding: 10px 24px 0;
      font-size: 12px;
      color: #888;
    }

    .score-badge {
      display: inline-block;
      background: #eaf4fe;
      color: #2980b9;
      border-radius: 8px;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 700;
      margin-left: 4px;
      vertical-align: middle;
    }

    .building-notice {
      text-align: center;
      padding: 40px 24px;
      color: #888;
      font-size: 14px;
    }

    main {
      padding: 16px 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Filter sheet */
    .fs-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .fs-sheet {
      background: #fff;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 540px;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (min-width: 601px) {
      .fs-overlay { align-items: center; }
      .fs-sheet { border-radius: 16px; max-height: 72vh; }
    }

    .fs-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
      gap: 8px;
    }

    .fs-title { font-size: 15px; font-weight: 700; flex: 1; }

    .fs-clear-btn {
      background: none; border: none;
      font-size: 12px; color: #999;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
    }
    .fs-clear-btn:hover { background: #f5f5f5; color: #555; }

    .fs-done-btn {
      background: #2980b9; color: #fff; border: none;
      font-size: 12px; font-weight: 600;
      cursor: pointer; padding: 6px 14px; border-radius: 8px;
    }
    .fs-done-btn:hover { background: #2471a3; }

    .fs-body { overflow-y: auto; flex: 1; padding: 4px 0 20px; }

    .fs-section {
      padding: 12px 20px;
      border-bottom: 1px solid #f5f5f5;
    }
    .fs-section:last-child { border-bottom: none; }

    .fs-section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: #bbb; margin-bottom: 9px;
    }

    .fs-pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .fs-pill {
      padding: 5px 13px; border-radius: 20px;
      border: 1.5px solid #ddd;
      font-size: 12px; font-weight: 500; color: #555;
      cursor: pointer; background: #fff;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .fs-pill:hover { border-color: #bbb; background: #f5f5f5; }
    .fs-pill.active { background: #2980b9; border-color: transparent; color: #fff; }

    .fs-checkbox-list {
      max-height: 200px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
    }

    .fs-checkbox-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 6px; cursor: pointer;
      font-size: 13px; color: #333;
      border-radius: 6px; user-select: none;
    }
    .fs-checkbox-row:hover { background: #f8f8f8; }

    .fs-checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: #2980b9; flex-shrink: 0;
    }

    .fs-source-dot {
      width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }

    .filter-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: #2980b9; color: #fff;
      border-radius: 10px; font-size: 10px; font-weight: 700;
      padding: 1px 6px; margin-left: 5px; min-width: 18px;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .card-body { padding: 10px 12px 12px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: #222;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta { font-size: 11px; color: #999; margin-top: 4px; }

    .source-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 680px;
      width: 100%;
      max-height: calc(100vh - 48px);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    #modal-content {
      overflow-y: auto;
      flex: 1;
    }

    /* Modal toolbar — always visible, never scrolls */
    .modal-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
      background: #fff;
      border-radius: 16px 16px 0 0;
    }

    .modal-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      color: #444;
      transition: background 0.15s;
      text-decoration: none;
    }

    .modal-action:hover { background: #f5f5f5; }

    .modal-action svg { flex-shrink: 0; }

    .modal-action span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #666;
    }

    .modal-action.add-btn { color: #27ae60; }
    .modal-action.add-btn span { color: #27ae60; }
    .modal-action.add-btn.added { color: #aaa; cursor: default; }
    .modal-action.add-btn.added span { color: #aaa; }
    .modal-action.dismiss-btn { color: #e67e22; }
    .modal-action.dismiss-btn span { color: #e67e22; }
    .modal-action.remove-btn { color: #c0392b; }
    .modal-action.remove-btn span { color: #c0392b; }

    .modal-action.visit-btn { color: #2980b9; }
    .modal-action.visit-btn span { color: #2980b9; }
    .modal-action.source-btn { color: #7f8c8d; }
    .modal-action.source-btn span { color: #7f8c8d; }

    .modal-close-btn {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      color: #999;
      transition: background 0.15s;
    }

    .modal-close-btn:hover { background: #f5f5f5; color: #555; }

    .modal-close-btn svg { flex-shrink: 0; }

    .modal-close-btn span {
      font-size: 10px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.3px;
    }

    .modal-image {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .modal-image-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      flex-shrink: 0;
    }

    .modal-body { padding: 20px 24px 28px; }

    .modal-source {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #c0392b;
      margin-bottom: 5px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      color: #111;
      margin-bottom: 8px;
    }

    .modal-meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #555;
      margin: 18px 0 8px;
    }

    .modal-ingredients {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 16px;
    }

    .modal-ingredients li {
      font-size: 13px;
      color: #333;
      padding: 3px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .modal-instructions { list-style: none; counter-reset: steps; }

    .modal-instructions li {
      counter-increment: steps;
      font-size: 13px;
      color: #333;
      line-height: 1.6;
      padding: 9px 0 9px 34px;
      position: relative;
      border-bottom: 1px solid #f5f5f5;
    }

    .modal-instructions li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      top: 9px;
      width: 22px;
      height: 22px;
      background: #c0392b;
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state { text-align: center; padding: 80px 24px; color: #aaa; }
    .empty-state p { margin-top: 12px; font-size: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px;
      gap: 14px;
    }

    .loading-ring {
      width: 44px;
      height: 44px;
      border: 3px solid #e8e8e8;
      border-top-color: #2980b9;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .loading-state p {
      font-size: 14px;
      color: #aaa;
    }

    /* View toggle */
    .view-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      position: sticky;
      top: 0; /* overridden by JS once header height is known */
      z-index: 9;
    }

    .view-btn {
      flex: 1;
      min-width: 0;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1.5px solid #ddd;
      background: #fff;
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn.active {
      background: #222;
      border-color: #222;
      color: #fff;
    }

    /* Filter button — icon-only, visually distinct from view pills */
    .filter-toggle {
      flex: 0 0 38px;
      width: 38px;
      height: 34px;
      padding: 0;
      background: #eaf4fe;
      border: 1.5px solid #b3d4f0;
      border-radius: 20px;
      color: #2980b9;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.15s;
      margin-left: 2px;
    }

    .filter-toggle:hover { background: #d6eaf8; }

    .filter-toggle.has-filters {
      background: #2980b9;
      border-color: #2980b9;
      color: #fff;
    }

    .filter-toggle .filter-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      font-size: 9px;
      font-weight: 700;
      border-radius: 10px;
      line-height: 16px;
      margin-left: 0;
    }


    /* Added card overlay */
    .card.in-collection::after {
      content: '✓';
      position: absolute;
      inset: 0;
      background: rgba(39, 174, 96, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #27ae60;
      border-radius: 10px;
      pointer-events: none;
    }

    /* ── This Week view ── */
    .week-section-label {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px 6px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #bbb;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      padding: 8px 24px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .week-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
    }

    .week-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.13);
    }

    .week-day-header {
      padding: 8px 10px 6px;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #fff;
    }

    .week-day-header .day-date {
      display: block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0;
      opacity: 0.85;
      margin-top: 1px;
    }

    .week-card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .week-card-image-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .week-card-body {
      padding: 8px 10px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .week-card-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      color: #222;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .week-card-meta {
      font-size: 10px;
      color: #999;
      margin-top: auto;
    }

    .health-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .health-pill.heart-healthy { background: #e8f5e9; color: #2e7d32; }
    .health-pill.moderate      { background: #fff3e0; color: #e65100; }
    .health-pill.indulgent     { background: #fce4ec; color: #c62828; }
    .health-pill.balanced      { background: #e3f2fd; color: #1565c0; }
    .health-pill.other         { background: #f3f3f3; color: #666; }

    .week-empty {
      text-align: center;
      padding: 80px 24px;
      color: #aaa;
      font-size: 14px;
    }

    /* Lunch tile */
    .lunch-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4px 24px 36px;
    }

    .lunch-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      max-width: 480px;
    }

    .lunch-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .lunch-card-img {
      width: 88px;
      height: 88px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .lunch-card-img-placeholder {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .lunch-card-body {
      padding: 12px 16px;
      flex: 1;
      min-width: 0;
    }

    .lunch-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lunch-card-meta {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lunch-none {
      font-size: 13px;
      color: #bbb;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    #user-greeting { font-size: 13px; color: #888; }

    .sign-out-link {
      font-size: 13px;
      color: #555;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      white-space: nowrap;
    }

    /* Mobile */
    @media (max-width: 600px) {
      /* Two-row header: [title | sign-out] / [search bar full-width] */
      header {
        padding: 10px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-title { flex: 1; }
      .header-actions { display: none; }
      .search-wrap {
        order: 3;
        flex: 1 0 100%;
        width: 100%;
        max-width: none;
        margin-left: 0;
      }
      .search-hint { display: none; }

      main   { padding: 12px 12px 32px; }

      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }

      .modal-overlay { padding: 0; align-items: flex-end; }

      .modal {
        border-radius: 20px 20px 0 0;
        max-height: calc(95dvh - env(safe-area-inset-bottom, 0px));
      }

      /* Flip toolbar to bottom of bottom sheet so it's always visible */
      .modal-toolbar {
        order: 2;
        border-bottom: none;
        border-top: 1px solid #f0f0f0;
        border-radius: 0;
        padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
        justify-content: space-around;
      }

      .modal-close-btn { margin-left: 0; }

      #modal-content { order: 1; }

      .modal-ingredients { grid-template-columns: 1fr; }

      .modal-image { height: 180px; }

      .modal-action { padding: 8px 12px; }
      .modal-close-btn { padding: 8px 12px; }

      .view-bar { padding: 8px 8px; gap: 4px; }
      .view-btn { padding: 5px 8px; font-size: 11px; }
      .filter-toggle { flex: 0 0 34px; width: 34px; }

      .week-grid {
        grid-template-columns: repeat(4, 1fr);
        padding: 8px 12px 20px;
        gap: 8px;
      }

      .week-section-label { padding: 12px 12px 4px; }
      .lunch-wrap { padding: 4px 12px 28px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Recipe Review</h1>
    <p id="subtitle">Loading...</p>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search or ask a question…"
           autocomplete="off" spellcheck="false">
    <button id="search-clear" onclick="clearSearch()" title="Clear search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="search-hint" id="search-hint">Enter for semantic search</div>
  </div>
  <div class="header-actions">
    <span id="user-greeting"></span>
    <a href="/logout" class="sign-out-link">Sign out</a>
  </div>
</header>

<div class="view-bar">
  <button class="view-btn active" onclick="setView('week', this)">This Week</button>
  <button class="view-btn" onclick="setView('new', this)">New</button>
  <button class="view-btn" onclick="setView('collection', this)">Collection</button>
  <button class="filter-toggle" id="filter-btn" onclick="openFilterSheet()" style="display:none" title="Filters">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    <span class="filter-badge" id="filter-badge" style="display:none">0</span>
  </button>
</div>

<main id="main"></main>

<div class="fs-overlay" id="fs-overlay" style="display:none" onclick="handleFsOverlayClick(event)">
  <div class="fs-sheet" id="fs-sheet">
    <div class="fs-header">
      <span class="fs-title">Filters</span>
      <button class="fs-clear-btn" onclick="clearAllFilters()">Clear all</button>
      <button class="fs-done-btn" onclick="closeFilterSheet()">Done</button>
    </div>
    <div class="fs-body" id="filter-sheet-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-toolbar" id="modal-toolbar">
      <!-- populated by openModal -->
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
  let allRecipes = [];
  let weekMeals = [];
  let lunchPick  = null;
  let currentIdx = null;
  let currentView = localStorage.getItem('menubuilder_view') || 'week';
  let searchMode = null;   // null = off, 'local' = live filter, 'semantic' = results
  let searchResults = [];  // semantic results
  let searchIndexReady = false;
  let _localDebounce = null;

  const activeFilters = { health: null, mealType: null, timesCooked: null, cuisines: new Set(), sources: new Set() };

  // Poll index status in background once page loads
  async function pollIndexStatus() {
    try {
      const res = await fetch('/api/search_status');
      const data = await res.json();
      searchIndexReady = data.ready;
      updateSearchHint();
      if (!searchIndexReady) setTimeout(pollIndexStatus, 2000);
    } catch { setTimeout(pollIndexStatus, 3000); }
  }

  function updateSearchHint() {
    const hint = document.getElementById('search-hint');
    if (!hint) return;
    if (searchIndexReady) {
      hint.textContent = 'Enter for semantic search';
      hint.style.color = '#bbb';
    } else {
      hint.textContent = 'Building index…';
      hint.style.color = '#e67e22';
    }
  }

  function onSearchInput(e) {
    const q = e.target.value.trim();
    document.getElementById('search-clear').style.display = q ? 'block' : 'none';
    document.getElementById('search-hint').style.display = q ? 'block' : 'none';

    if (!q) {
      clearSearch();
      return;
    }

    // Live local filter while typing
    clearTimeout(_localDebounce);
    _localDebounce = setTimeout(() => {
      if (searchMode !== 'semantic') {
        searchMode = 'local';
        renderGrid();
      }
    }, 120);
  }

  async function onSearchKeydown(e) {
    if (e.key === 'Escape') { clearSearch(); return; }
    if (e.key !== 'Enter') return;

    const q = e.target.value.trim();
    if (!q) return;

    if (!searchIndexReady) {
      // Fall back to local-only if index not ready
      searchMode = 'local';
      renderGrid();
      return;
    }

    searchMode = 'semantic';
    showLoading(`Searching for "${escHtml(q)}"…`);
    updateSubtitle(0);

    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      if (res.status === 202) {
        document.getElementById('main').innerHTML =
          `<div class="building-notice">Index still building — try again in a moment.</div>`;
        return;
      }
      searchResults = await res.json();
      renderGrid();
    } catch (err) {
      document.getElementById('main').innerHTML =
        `<div class="building-notice">Search error: ${escHtml(String(err))}</div>`;
    }
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').style.display = 'none';
    document.getElementById('search-hint').style.display = 'none';
    searchMode = null;
    searchResults = [];
    renderGrid();
  }

  function localFilter(recipes) {
    const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
    if (!q) return recipes;
    return recipes.filter(r => {
      const hay = [
        r.title, r.cuisine, r.source,
        ...(r.ingredients || []),
        ...(typeof r.ingredients === 'string' ? [] : []),
      ].join(' ').toLowerCase();
      return q.split(/\s+/).every(word => hay.includes(word));
    });
  }

  function updateFilterBadge() {
    let count = 0;
    if (activeFilters.health !== null) count++;
    if (activeFilters.mealType !== null) count++;
    if (activeFilters.timesCooked !== null) count++;
    if (activeFilters.cuisines.size > 0) count++;
    if (activeFilters.sources.size > 0) count++;
    const badge = document.getElementById('filter-badge');
    if (!badge) return;
    badge.textContent = count;
    badge.style.display = count > 0 ? '' : 'none';
    const btn = document.getElementById('filter-btn');
    if (btn) btn.classList.toggle('has-filters', count > 0);
  }

  function openFilterSheet() {
    if (!allRecipes.length) return;
    renderFilterSheet();
    document.getElementById('fs-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeFilterSheet() {
    document.getElementById('fs-overlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  function handleFsOverlayClick(e) {
    if (e.target === document.getElementById('fs-overlay')) closeFilterSheet();
  }

  function clearAllFilters() {
    activeFilters.health = null;
    activeFilters.mealType = null;
    activeFilters.timesCooked = null;
    activeFilters.cuisines = new Set();
    activeFilters.sources = new Set();
    renderFilterSheet();
    updateFilterBadge();
    renderGrid();
  }

  function setSingleFilter(key, val, btn) {
    activeFilters[key] = val;
    btn.closest('.fs-pills').querySelectorAll('.fs-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    updateFilterBadge();
    renderGrid();
  }

  function toggleSetFilter(key, val, checkbox) {
    if (checkbox.checked) activeFilters[key].add(val);
    else activeFilters[key].delete(val);
    updateFilterBadge();
    renderGrid();
  }

  function normCuisine(c) {
    if (!c) return 'Other';
    if (Array.isArray(c)) return c.join(', ') || 'Other';
    return String(c);
  }

  function renderFilterSheet() {
    const allCuisines = [...new Set(allRecipes.map(r => normCuisine(r.cuisine)))].sort();
    const allSources  = [...new Set(allRecipes.map(r => r.source  || 'Unknown'))].sort();

    function pillsHtml(pills, key) {
      return pills.map(([label, val]) => {
        const active = activeFilters[key] === val ? ' active' : '';
        const valStr = val === null ? 'null' : `'${escHtml(val)}'`;
        return `<button class="fs-pill${active}" onclick="setSingleFilter('${key}',${valStr},this)">${escHtml(label)}</button>`;
      }).join('');
    }

    const triedSection = currentView === 'collection' ? `
      <div class="fs-section">
        <div class="fs-section-title">Tried</div>
        <div class="fs-pills">${pillsHtml([['All',null],['Never Tried','never'],['Tried','tried']],'timesCooked')}</div>
      </div>` : '';

    const cuisineHtml = allCuisines.map(c => {
      const checked = activeFilters.cuisines.has(c) ? ' checked' : '';
      return `<label class="fs-checkbox-row"><input type="checkbox"${checked} onchange="toggleSetFilter('cuisines','${escHtml(c)}',this)"> ${escHtml(c)}</label>`;
    }).join('');

    const sourceHtml = allSources.map(s => {
      const checked = activeFilters.sources.has(s) ? ' checked' : '';
      const color = sourceColor(s);
      return `<label class="fs-checkbox-row"><input type="checkbox"${checked} onchange="toggleSetFilter('sources','${escHtml(s)}',this)"><span class="fs-source-dot" style="background:${color}"></span> ${escHtml(s)}</label>`;
    }).join('');

    document.getElementById('filter-sheet-body').innerHTML = `
      <div class="fs-section">
        <div class="fs-section-title">Health</div>
        <div class="fs-pills">${pillsHtml([['All',null],['Heart-Healthy','Heart-Healthy'],['Moderate','Moderate'],['Indulgent','Indulgent']],'health')}</div>
      </div>
      <div class="fs-section">
        <div class="fs-section-title">Time</div>
        <div class="fs-pills">${pillsHtml([['All',null],['Weeknight','Weeknight'],['Weekend','Weekend']],'mealType')}</div>
      </div>
      ${triedSection}
      <div class="fs-section">
        <div class="fs-section-title">Cuisine</div>
        <div class="fs-checkbox-list">${cuisineHtml}</div>
      </div>
      <div class="fs-section">
        <div class="fs-section-title">Source</div>
        <div class="fs-checkbox-list">${sourceHtml}</div>
      </div>
    `;
  }

  function applyFilters(recipes) {
    return recipes.filter(r => {
      if (activeFilters.health !== null && r.health !== activeFilters.health) return false;
      if (activeFilters.mealType !== null) {
        if ((r.meal_type || '').toLowerCase() !== activeFilters.mealType.toLowerCase()) return false;
      }
      if (activeFilters.timesCooked === 'never' && (r.times_cooked || 0) > 0) return false;
      if (activeFilters.timesCooked === 'tried' && (r.times_cooked || 0) === 0) return false;
      if (activeFilters.cuisines.size > 0 && !activeFilters.cuisines.has(normCuisine(r.cuisine))) return false;
      if (activeFilters.sources.size > 0 && !activeFilters.sources.has(r.source || 'Unknown')) return false;
      return true;
    });
  }

  const SOURCE_COLORS = [
    '#c0392b', '#2980b9', '#27ae60', '#8e44ad',
    '#d35400', '#16a085', '#2c3e50', '#f39c12',
  ];
  const sourceColorCache = {};
  let colorIdx = 0;

  function sourceColor(src) {
    if (!sourceColorCache[src]) {
      sourceColorCache[src] = SOURCE_COLORS[colorIdx % SOURCE_COLORS.length];
      colorIdx++;
    }
    return sourceColorCache[src];
  }

  async function load() {
    showLoading();
    const endpoint = currentView === 'collection' ? '/api/collection' : '/api/recipes';
    const res = await fetch(endpoint);
    allRecipes = await res.json();

    if (!Array.isArray(allRecipes) || allRecipes.length === 0) {
      renderFilters();
      document.getElementById('main').innerHTML = `
        <div class="empty-state">
          <div style="font-size:48px">🍝</div>
          <p>${currentView === 'new'
            ? 'No new candidates. Run an agent first:<br><code>python3 fill_menu_ideas.py --dry-run --agents italian</code>'
            : 'No recipes in the collection yet.'}</p>
        </div>`;
      document.getElementById('subtitle').textContent = '0 results';
      return;
    }

    // New view: only show candidates not yet in the collection
    if (currentView === 'new') {
      allRecipes = allRecipes.filter(r => !r.in_collection);
    }

    for (const r of allRecipes) sourceColor(r.source || 'Unknown');
    updateFilterBadge();
    renderGrid();
  }

  function updateSubtitle(visibleCount) {
    if (searchMode === 'semantic') {
      document.getElementById('subtitle').textContent = `${visibleCount} search results`;
      return;
    }
    if (searchMode === 'local') {
      const total = allRecipes.length;
      const label = currentView === 'collection' ? 'in collection' : 'new candidates';
      document.getElementById('subtitle').textContent = `${visibleCount} of ${total} ${label}`;
      return;
    }
    const total = allRecipes.length;
    const label = currentView === 'collection' ? 'in collection' : 'new candidates';
    const suffix = visibleCount < total ? ` of ${total}` : '';
    document.getElementById('subtitle').textContent = `${visibleCount}${suffix} ${label}`;
  }

  async function setView(v, btn) {
    currentView = v;
    localStorage.setItem('menubuilder_view', v);
    activeFilters.health = null;
    activeFilters.mealType = null;
    activeFilters.timesCooked = null;
    activeFilters.cuisines = new Set();
    activeFilters.sources = new Set();
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('subtitle').textContent = 'Loading…';

    const filterBtn = document.getElementById('filter-btn');
    if (v === 'week') {
      filterBtn.style.display = 'none';
      await loadWeek();
    } else {
      filterBtn.style.display = '';
      await load();
    }
  }

  async function loadWeek() {
    showLoading();
    const [res, lunchRes] = await Promise.all([
      fetch('/api/this_week'),
      fetch('/api/lunch_pick'),
    ]);
    const data = await res.json();
    lunchPick = await lunchRes.json();

    if (!data.found || !data.meals || !data.meals.length) {
      document.getElementById('main').innerHTML =
        `<div class="week-empty">No meal plan found for this week.</div>`;
      document.getElementById('subtitle').textContent = 'This week';
      return;
    }

    weekMeals = data.meals;

    const sun = new Date(data.week_start + 'T00:00:00');
    const sat = new Date(data.week_end   + 'T00:00:00');
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('subtitle').textContent =
      `${fmt(sun)} – ${fmt(sat)}`;

    renderWeek();
  }

  const _DAY_COLORS = {
    Sun: '#c0392b', Mon: '#2980b9', Tue: '#27ae60',
    Wed: '#8e44ad', Thu: '#d35400', Fri: '#16a085', Sat: '#2c3e50',
  };

  function healthPillClass(health) {
    const h = (health || '').toLowerCase();
    if (h.includes('heart'))   return 'heart-healthy';
    if (h.includes('moderate')) return 'moderate';
    if (h.includes('indulg'))  return 'indulgent';
    if (h.includes('balanc'))  return 'balanced';
    return 'other';
  }

  function renderWeek() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    // Dinner section
    const dinnerLabel = document.createElement('div');
    dinnerLabel.className = 'week-section-label';
    dinnerLabel.textContent = 'Dinner';
    main.appendChild(dinnerLabel);

    const grid = document.createElement('div');
    grid.className = 'week-grid';

    weekMeals.forEach((m, idx) => {
      const color  = _DAY_COLORS[m.day] || '#555';
      const pClass = healthPillClass(m.health);

      let dateDisplay = '';
      if (m.date) {
        const d = new Date(m.date + 'T00:00:00');
        dateDisplay = d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
      }

      const imageHtml = m.image
        ? `<img class="week-card-image" src="/api/img?url=${encodeURIComponent(m.image)}"
               alt="${escHtml(m.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="week-card-image-placeholder" style="display:none">🍽</div>`
        : `<div class="week-card-image-placeholder">🍽</div>`;

      const card = document.createElement('div');
      card.className = 'week-card';
      card.onclick = () => openWeekModal(idx);
      card.innerHTML = `
        <div class="week-day-header" style="background:${color}">
          ${escHtml(m.day)}
          <span class="day-date">${escHtml(dateDisplay)}</span>
        </div>
        ${imageHtml}
        <div class="week-card-body">
          <div class="week-card-title">${escHtml(m.title)}</div>
          <div class="week-card-meta">
            <span class="health-pill ${pClass}">${escHtml(m.health)}</span>
          </div>
          ${m.time ? `<div class="week-card-meta">${escHtml(m.time)}</div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });

    main.appendChild(grid);

    // Lunch section
    const lunchLabel = document.createElement('div');
    lunchLabel.className = 'week-section-label';
    lunchLabel.textContent = 'Lunch';
    main.appendChild(lunchLabel);

    const lunchWrap = document.createElement('div');
    lunchWrap.className = 'lunch-wrap';

    if (lunchPick && lunchPick.status === 'selected') {
      const lp = lunchPick;
      const pClass = healthPillClass(lp.health);
      const imgHtml = lp.image
        ? `<img class="lunch-card-img" src="/api/img?url=${encodeURIComponent(lp.image)}"
               alt="${escHtml(lp.name)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="lunch-card-img-placeholder" style="display:none">🥗</div>`
        : `<div class="lunch-card-img-placeholder">🥗</div>`;

      const card = document.createElement('div');
      card.className = 'lunch-card';
      card.onclick = () => openLunchModal();
      card.innerHTML = `
        ${imgHtml}
        <div class="lunch-card-body">
          <div class="lunch-card-title">${escHtml(lp.name)}</div>
          <div class="lunch-card-meta">
            ${lp.health ? `<span class="health-pill ${pClass}">${escHtml(lp.health)}</span>` : ''}
            ${lp.time   ? `<span>${escHtml(lp.time)}</span>` : ''}
          </div>
        </div>
      `;
      lunchWrap.appendChild(card);
    } else {
      lunchWrap.innerHTML = `<div class="lunch-none">No lunch pick for this week yet.</div>`;
    }

    main.appendChild(lunchWrap);
  }

  function openLunchModal() {
    if (!lunchPick || lunchPick.status !== 'selected') return;
    const lp = lunchPick;

    const visitHref = lp.url ? `href="${lp.url}" target="_blank" rel="noopener"` : '';
    document.getElementById('modal-toolbar').innerHTML = `
      ${lp.url
        ? `<a class="modal-action visit-btn" ${visitHref} title="Open recipe">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
               <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
             </svg>
             <span>Recipe</span>
           </a>`
        : ''}
      <button class="modal-close-btn" onclick="closeModal()" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span>Close</span>
      </button>
    `;

    const imageHtml = lp.image
      ? `<img class="modal-image" src="/api/img?url=${encodeURIComponent(lp.image)}"
             alt="${escHtml(lp.name)}" onerror="this.style.display='none'">`
      : `<div class="modal-image-placeholder">🥗</div>`;

    const pClass = healthPillClass(lp.health);
    const ings   = (lp.ingredients  || []).map(i => `<li>${escHtml(i)}</li>`).join('');
    const steps  = (lp.instructions || []).map(s => `<li>${escHtml(s)}</li>`).join('');

    document.getElementById('modal-content').innerHTML = `
      ${imageHtml}
      <div class="modal-body">
        <div style="margin-bottom:6px">
          <span style="background:#7f8c8d;color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700">Lunch</span>
          <span style="font-size:12px;color:#888;margin-left:8px">This week</span>
        </div>
        <div class="modal-title">${escHtml(lp.name)}</div>
        <div class="modal-meta">
          ${lp.health ? `<span class="health-pill ${pClass}">${escHtml(lp.health)}</span>` : ''}
          ${lp.time   ? `<span style="margin-left:8px">${escHtml(lp.time)}</span>` : ''}
        </div>
        ${ings  ? `<div class="modal-section-title">Ingredients</div><ul class="modal-ingredients">${ings}</ul>` : ''}
        ${steps ? `<div class="modal-section-title">Instructions</div><ol class="modal-instructions">${steps}</ol>` : ''}
      </div>
    `;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function openWeekModal(idx) {
    const m = weekMeals[idx];
    currentIdx = idx;

    const visitHref = m.url ? `href="${m.url}" target="_blank" rel="noopener"` : '';
    document.getElementById('modal-toolbar').innerHTML = `
      ${m.url
        ? `<a class="modal-action visit-btn" ${visitHref} title="Open recipe">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
               <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
             </svg>
             <span>Recipe</span>
           </a>`
        : ''}
      <button class="modal-close-btn" onclick="closeModal()" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span>Close</span>
      </button>
    `;

    const imageHtml = m.image
      ? `<img class="modal-image" src="/api/img?url=${encodeURIComponent(m.image)}"
             alt="${escHtml(m.title)}" onerror="this.style.display='none'">`
      : `<div class="modal-image-placeholder">🍽</div>`;

    const color    = _DAY_COLORS[m.day] || '#555';
    const pClass   = healthPillClass(m.health);
    const ings     = (m.ingredients  || []).map(i => `<li>${escHtml(i)}</li>`).join('');
    const steps    = (m.instructions || []).map(s => `<li>${escHtml(s)}</li>`).join('');

    let dateDisplay = '';
    if (m.date) {
      const d = new Date(m.date + 'T00:00:00');
      dateDisplay = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    document.getElementById('modal-content').innerHTML = `
      ${imageHtml}
      <div class="modal-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="background:${color};color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700">${escHtml(m.day)}</span>
          <span style="font-size:12px;color:#888">${escHtml(dateDisplay)}</span>
        </div>
        <div class="modal-title">${escHtml(m.title)}</div>
        <div class="modal-meta">
          <span class="health-pill ${pClass}">${escHtml(m.health)}</span>
          ${m.time ? `<span style="margin-left:8px">${escHtml(m.time)}</span>` : ''}
          <span style="margin-left:8px;color:#888">${(m.times_cooked || 0) === 0 ? 'Never tried' : `Tried ${m.times_cooked}\xd7`}</span>
        </div>
        ${m.reminder ? `
          <div style="margin-top:14px;padding:10px 14px;background:#fafafa;border-left:3px solid ${color};border-radius:0 6px 6px 0;font-size:12px;color:#555;line-height:1.5">
            ${escHtml(m.reminder)}
          </div>` : ''}
        ${ings  ? `<div class="modal-section-title">Ingredients</div><ul class="modal-ingredients">${ings}</ul>` : ''}
        ${steps ? `<div class="modal-section-title">Instructions</div><ol class="modal-instructions">${steps}</ol>` : ''}
      </div>
    `;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderGrid() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    // Semantic search results bypass the normal grid
    if (searchMode === 'semantic') {
      const q = document.getElementById('search-input').value.trim();
      const visible = applyFilters(searchResults);
      if (!visible.length) {
        main.innerHTML = `<div class="empty-state"><p>No results for "${escHtml(q)}".</p></div>`;
        updateSubtitle(0);
        return;
      }
      const header = document.createElement('div');
      header.className = 'search-results-header';
      header.textContent = `Semantic results for "${q}"`;
      main.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'card-grid';
      grid.style.padding = '14px 0';
      for (const r of visible) {
        const idx = searchResults.indexOf(r);
        const card = buildCard(r, idx, true);
        grid.appendChild(card);
      }
      main.appendChild(grid);
      updateSubtitle(visible.length);
      return;
    }

    // Local mode: filter allRecipes by keyword
    let base = allRecipes;
    if (searchMode === 'local') base = localFilter(allRecipes);
    const visible = applyFilters(base).slice().sort((a, b) =>
      (a.title || '').localeCompare(b.title || ''));

    if (visible.length === 0) {
      main.innerHTML = `<div class="empty-state"><p>No recipes match the active filters.</p></div>`;
      updateSubtitle(0);
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    grid.style.padding = '14px 0';
    for (const r of visible) {
      grid.appendChild(buildCard(r, allRecipes.indexOf(r)));
    }
    main.appendChild(grid);
    updateSubtitle(visible.length);
  }

  function buildCard(recipe, idx, isSearchResult = false) {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(idx, isSearchResult);

    const src    = recipe.source || 'Unknown';
    const color  = sourceColor(src);
    const abbrev = src.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 3);

    const imageHtml = recipe.image
      ? `<img class="card-image" src="/api/img?url=${encodeURIComponent(recipe.image)}"
             alt="${escHtml(recipe.title)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-image-placeholder" style="display:none">🍽</div>`
      : `<div class="card-image-placeholder">🍽</div>`;

    if (recipe.in_collection) card.classList.add('in-collection');

    const scoreBadge = (isSearchResult && recipe.score != null)
      ? `<span class="score-badge">${Math.round(recipe.score * 100)}%</span>` : '';

    card.innerHTML = `
      ${imageHtml}
      <div class="source-badge" style="background:${color}">${abbrev}</div>
      <div class="card-body">
        <div class="card-title">${escHtml(recipe.title)}${scoreBadge}</div>
        ${recipe.time ? `<div class="card-meta">${escHtml(recipe.time)}</div>` : ''}
      </div>
    `;
    return card;
  }

  function openModal(idx, isSearchResult = false) {
    currentIdx = idx;
    const r = isSearchResult ? searchResults[idx] : allRecipes[idx];

    // Toolbar
    const visitHref = r.url ? `href="${r.url}" target="_blank" rel="noopener"` : '';
    document.getElementById('modal-toolbar').innerHTML = `
      ${currentView === 'new'
        ? `<button class="modal-action add-btn" onclick="addToCollection(${idx})" title="Add to Recipe Collection">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
               <line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/>
             </svg>
             <span>Add</span>
           </button>
           <button class="modal-action dismiss-btn" onclick="dismissRecipe(${idx})" title="Remove from New queue">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
             </svg>
             <span>Remove</span>
           </button>`
        : currentView === 'collection'
        ? `<button class="modal-action remove-btn" onclick="removeFromCollection(${idx})" title="Remove from collection">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
               <path d="M10 11v6"/><path d="M14 11v6"/>
               <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
             </svg>
             <span>Remove</span>
           </button>`
        : ''
      }
      ${currentView === 'collection'
        ? `${r.recipe_url
            ? `<a class="modal-action visit-btn" href="${r.recipe_url}" target="_blank" rel="noopener" title="Open recipe">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                   <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                   <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                 </svg>
                 <span>Recipe</span>
               </a>`
            : ''}
           ${r.source_url
            ? `<a class="modal-action source-btn" href="${r.source_url}" target="_blank" rel="noopener" title="View original source">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                   <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                   <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                 </svg>
                 <span>Source</span>
               </a>`
            : ''}`
        : `${r.url
            ? `<a class="modal-action visit-btn" href="${r.url}" target="_blank" rel="noopener" title="Visit original site">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                   <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                   <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                 </svg>
                 <span>Visit</span>
               </a>`
            : ''}`
      }
      <button class="modal-close-btn" onclick="closeModal()" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span>Close</span>
      </button>
    `;

    // Content
    const imageHtml = r.image
      ? `<img class="modal-image" src="/api/img?url=${encodeURIComponent(r.image)}"
             alt="${escHtml(r.title)}" onerror="this.style.display='none'">`
      : `<div class="modal-image-placeholder">🍽</div>`;

    const ings  = (r.ingredients  || []).map(i => `<li>${escHtml(i)}</li>`).join('');
    const steps = (r.instructions || []).map(s => `<li>${escHtml(s)}</li>`).join('');
    const timesCookedLabel = (r.times_cooked || 0) === 0 ? 'Never tried' : `Tried ${r.times_cooked}\xd7`;
    const yieldVal = Array.isArray(r.yield) ? r.yield.sort((a,b) => a.length - b.length)[0] : r.yield;
    const meta  = [r.time, yieldVal ? `Serves ${yieldVal}` : '', timesCookedLabel].filter(Boolean).join(' · ');

    document.getElementById('modal-content').innerHTML = `
      ${imageHtml}
      <div class="modal-body">
        <div class="modal-source">${escHtml(r.source || '')}</div>
        <div class="modal-title">${escHtml(r.title)}</div>
        ${meta ? `<div class="modal-meta">${escHtml(meta)}</div>` : ''}
        ${ings  ? `<div class="modal-section-title">Ingredients</div><ul class="modal-ingredients">${ings}</ul>` : ''}
        ${steps ? `<div class="modal-section-title">Instructions</div><ol class="modal-instructions">${steps}</ol>` : ''}
      </div>
    `;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    currentIdx = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  async function dismissRecipe(idx) {
    const r = allRecipes[idx];
    try {
      await fetch('/api/dismiss', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: r.url }),
      });
    } catch (e) { /* best-effort */ }
    allRecipes.splice(idx, 1);
    closeModal();
    renderGrid();
  }

  async function removeFromCollection(idx) {
    const r = allRecipes[idx];
    if (!confirm(`Remove "${r.title}" from your collection?`)) return;

    const btn = document.querySelector('.modal-action.remove-btn');
    if (btn) { btn.disabled = true; btn.querySelector('span').textContent = 'Removing…'; }

    try {
      const res = await fetch('/api/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: r.title }),
      });
      if (!res.ok) {
        const data = await res.json();
        alert(`Error: ${data.error || res.statusText}`);
        if (btn) { btn.disabled = false; btn.querySelector('span').textContent = 'Remove'; }
        return;
      }
    } catch (e) {
      alert('Network error — recipe not removed.');
      if (btn) { btn.disabled = false; btn.querySelector('span').textContent = 'Remove'; }
      return;
    }
    allRecipes.splice(idx, 1);
    closeModal();
    renderGrid();
  }

  async function addToCollection(idx) {
    const btn = document.querySelector('.modal-action.add-btn');
    btn.disabled = true;
    btn.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           style="animation:spin 1s linear infinite">
        <circle cx="12" cy="12" r="10" stroke-dasharray="31" stroke-dashoffset="10"/>
      </svg>
      <span>Adding...</span>`;

    try {
      const res = await fetch('/api/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allRecipes[idx]),
      });
      const data = await res.json();

      if (res.ok) {
        btn.classList.add('added');
        btn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Added</span>`;
        btn.onclick = null;

        // Remove from New view candidates and re-render
        allRecipes.splice(idx, 1);
        setTimeout(() => {
          closeModal();
          renderGrid();
        }, 600);
      } else {
        const msg = data.error === 'already_exists' ? 'Exists' : 'Error';
        btn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>${msg}</span>`;
        btn.disabled = false;
        btn.onclick = () => addToCollection(idx);
      }
    } catch (e) {
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span>Error</span>`;
      btn.disabled = false;
      btn.onclick = () => addToCollection(idx);
    }
  }


  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('fs-overlay').style.display !== 'none') closeFilterSheet();
      else closeModal();
    }
  });

  // Wire search input
  const _si = document.getElementById('search-input');
  _si.addEventListener('input', onSearchInput);
  _si.addEventListener('keydown', onSearchKeydown);
  document.getElementById('search-hint').style.display = 'none';

  function showLoading(msg = 'Loading…') {
    document.getElementById('main').innerHTML = `
      <div class="loading-state">
        <div class="loading-ring"></div>
        <p>${escHtml(msg)}</p>
      </div>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Restore saved view (or default to week)
  {
    const savedBtn = [...document.querySelectorAll('.view-btn')]
      .find(b => b.getAttribute('onclick')?.includes(`'${currentView}'`));
    if (savedBtn) {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      savedBtn.classList.add('active');
    }
    const filterBtn = document.getElementById('filter-btn');
    if (currentView === 'week') {
      filterBtn.style.display = 'none';
      loadWeek();
    } else {
      filterBtn.style.display = '';
      load();
    }
  }
  pollIndexStatus();
  fetch('/api/me').then(r => r.json()).then(data => {
    if (data.name) document.getElementById('user-greeting').textContent = `Hi, ${data.name}`;
  });

  function updateViewBarTop() {
    const h = document.querySelector('header');
    const vb = document.querySelector('.view-bar');
    if (h && vb) vb.style.top = h.offsetHeight + 'px';
  }
  window.addEventListener('resize', updateViewBarTop);
  window.addEventListener('load', updateViewBarTop);
  updateViewBarTop();
</script>
</body>
</html>
